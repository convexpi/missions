site_name: ConvexPi
site_description: Open-source quantitative finance education platform — Arena exchange + Lab backtester + web leaderboard
site_url: https://convexpi.ai/docs/
repo_url: https://github.com/convexpi/missions
repo_name: convexpi/missions
edit_uri: edit/master/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Missions:
    - Overview: missions/index.md
    - "Mission 1: Overfitting Game": missions/mission-01.md
    - "Mission 2: Market Maker": missions/mission-02.md
    - "Mission 3: Alpha Discovery": missions/mission-03.md
  - Platform:
    - Architecture: platform-architecture.md
    - Design Notes: design.md
    - Roadmap: ROADMAP.md
    - Ideas: ideas.md
  - Deployment: deployment.md
